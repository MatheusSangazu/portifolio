<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .card { fill: #F97316; }
    .card-dark { fill: #C2410C; }
    .card-light { fill: #FDBA74; }
    .letter { fill: #0C0A09; }
    .suit { fill: #F97316; animation: shine 3s ease-in-out infinite; }
    @keyframes shine {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
  <rect width="32" height="32" rx="2" fill="#1C1917"/>
  <rect class="card" x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#F97316" stroke-width="1.5"/>
  <rect class="card-dark" x="3" y="3" width="26" height="2" rx="0.5" opacity="0.3"/>
  <rect class="card-dark" x="3" y="27" width="26" height="2" rx="0.5" opacity="0.3"/>
  <rect class="card-dark" x="3" y="3" width="2" height="26" rx="0.5" opacity="0.3"/>
  <rect class="card-dark" x="27" y="3" width="2" height="26" rx="0.5" opacity="0.3"/>
  <rect class="card-light" x="5" y="7" width="4" height="1" rx="0.5" opacity="0.15"/>
  <rect class="card-light" x="23" y="24" width="4" height="1" rx="0.5" opacity="0.15"/>
  <polygon class="letter" points="10,9 11,9 11,13 14,13 14,9 15,9 15,22 13,22 13,15 12,15 12,22 10,22"/>
  <polygon class="suit" points="22,11 23,9 24,11" opacity="0.8"/>
  <rect class="suit" x="22.5" y="11" width="1" height="4" opacity="0.6"/>
  <polygon class="suit" points="22,16 23,18 24,16" opacity="0.8"/>
</svg>
